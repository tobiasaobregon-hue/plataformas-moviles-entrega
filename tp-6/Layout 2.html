<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layouts</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f5f5f5; }

        .box {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .content {
            padding: 2em;
            text-align: center;
            font-weight: bold;
        }

        .s1 {background-color: #ca9f77;}
        .s2 {background-color: #cbc168;}
        .s3 {background-color: #a3c55b;}
        .s4 {background-color: #76d179;}
        .s5 {background-color: #85e3c1;}
        .s6 {background-color: #79bfe5;}
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row g-4">

        <!-- 🔷 Layout 1 -->
        <div class="col-md-4">
            <div class="box">
                <div class="row g-0">
                    <div class="col-12"><div class="content s1">1</div></div>
                    <div class="col-12"><div class="content s2">2</div></div>
                    <div class="col-12"><div class="content s3">3</div></div>
                    <div class="col-12"><div class="content s4">4</div></div>
                    <div class="col-6"><div class="content s5">5</div></div>
                    <div class="col-6"><div class="content s6">6</div></div>
                </div>
            </div>
        </div>

        <!-- 🔷 Layout 2 -->
        <div class="col-md-4">
            <div class="box">
                <div class="row g-0">
                    <div class="col-6"><div class="content s1">1</div></div>
                    <div class="col-6"><div class="content"></div></div>

                    <div class="col-4"><div class="content s2">2</div></div>
                    <div class="col-4"><div class="content s3">3</div></div>
                    <div class="col-4"><div class="content s4">4</div></div>

                    <div class="col-6"><div class="content s5">5</div></div>
                    <div class="col-6"><div class="content s6">6</div></div>
                </div>
            </div>
        </div>

        <!-- 🔷 Layout 3 -->
        <div class="col-md-4">
            <div class="box">
                <div class="row g-0">
                    <div class="col-6"><div class="content s1">1</div></div>
                    <div class="col-6"><div class="content"></div></div>

                    <div class="col-3"><div class="content s2">2</div></div>
                    <div class="col-6"><div class="content s3">3</div></div>
                    <div class="col-3"><div class="content s4">4</div></div>

                    <div class="col-6"><div class="content s5">5</div></div>
                    <div class="col-6"><div class="content s6">6</div></div>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
